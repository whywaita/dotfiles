name: Setup dotfiles

on:
  workflow_call:
    inputs:
      runs-on:
        description: "Runner to use"
        type: string
        default: ubuntu-latest
        required: false
      symlinks:
        description: "Create dotfile symlinks"
        type: boolean
        default: true
        required: false
      claude:
        description: "Setup Claude Code configuration"
        type: boolean
        default: true
        required: false
      codex:
        description: "Setup Codex configuration"
        type: boolean
        default: true
        required: false
      nvim:
        description: "Setup Neovim (dein.vim)"
        type: boolean
        default: false
        required: false
      homebrew:
        description: "Install Homebrew"
        type: boolean
        default: false
        required: false
      go-tools:
        description: "Install Go tools"
        type: boolean
        default: false
        required: false
      brewfile:
        description: "Run brewfile.sh (Homebrew packages)"
        type: boolean
        default: false
        required: false
      dotfiles-ref:
        description: "Ref of dotfiles repo to use"
        type: string
        default: main
        required: false

jobs:
  setup:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: whywaita/dotfiles
          ref: ${{ inputs.dotfiles-ref }}
          path: dotfiles

      - name: Setup symlinks
        if: ${{ inputs.symlinks }}
        run: ./dotfiles/scripts/setup-symlinks.sh

      - name: Setup Claude Code
        if: ${{ inputs.claude }}
        run: ./dotfiles/scripts/setup-claude.sh

      - name: Setup Codex
        if: ${{ inputs.codex }}
        run: ./dotfiles/scripts/setup-codex.sh

      - name: Setup Neovim
        if: ${{ inputs.nvim }}
        run: ./dotfiles/scripts/setup-nvim.sh

      - name: Install Homebrew
        if: ${{ inputs.homebrew }}
        run: ./dotfiles/scripts/setup-homebrew.sh

      - name: Setup Go
        if: ${{ inputs.go-tools }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Install Go tools
        if: ${{ inputs.go-tools }}
        run: ./dotfiles/scripts/setup-go-tools.sh

      - name: Setup Homebrew (for brewfile)
        if: ${{ inputs.brewfile }}
        uses: Homebrew/actions/setup-homebrew@main

      - name: Run brewfile
        if: ${{ inputs.brewfile }}
        run: ./dotfiles/brewfile.sh
