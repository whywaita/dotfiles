name: dotfiles lint and check

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck zsh
      - name: Check shell scripts with shellcheck
        run: git ls-files '*.sh' | xargs shellcheck
      - name: Run Claude setup test
        run: ./tests/setup_claude_test.sh
      - name: Check zshrc syntax
        run: zsh -n .zshrc

  lua-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install luacheck
        run: sudo apt-get install -y lua-check
      - name: Check Lua files
        run: luacheck .wezterm.lua --no-unused-args --no-redefined --no-max-line-length

  tmux-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install tmux
        run: sudo apt-get install -y tmux
      - name: Check tmux config syntax
        run: |
          # tmux の設定ファイルを読み込んでエラーがないか確認
          tmux -f .tmux.conf start-server \; kill-server

  toml-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install taplo
        run: |
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz | gunzip > taplo
          chmod +x taplo
          sudo mv taplo /usr/local/bin/
      - name: Check TOML syntax
        run: taplo check nvim/*.toml

  neovim-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - name: Cache dein.vim
        id: cache-dein
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/dein
          key: dein-${{ runner.os }}-${{ hashFiles('nvim/*.toml') }}
          restore-keys: |
            dein-${{ runner.os }}-
      - name: Install Neovim
        run: |
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:neovim-ppa/unstable -y
          sudo apt-get update
          sudo apt-get install -y neovim
      - name: Setup Neovim config
        run: |
          mkdir -p ~/.config/nvim
          ln -s "$PWD/nvim/init.vim" ~/.config/nvim/init.vim
          mkdir -p ~/dotfiles
          ln -s "$PWD/nvim" ~/dotfiles/nvim
      - name: Install dein.vim and plugins
        run: |
          # dein.vim をインストール
          if [ ! -d "$HOME/.cache/dein/repos/github.com/Shougo/dein.vim" ]; then
            mkdir -p ~/.cache/dein/repos/github.com/Shougo
            git clone https://github.com/Shougo/dein.vim.git ~/.cache/dein/repos/github.com/Shougo/dein.vim
          fi
          # プラグインをインストール
          output=$(nvim --headless -c "call dein#install()" -c "qall" 2>&1) || true
          echo "$output"
          if echo "$output" | grep -qE 'E[0-9]+:'; then exit 1; fi
      - name: Check Neovim config
        run: |
          # 設定を読み込んでエラーがないか確認
          output=$(nvim --headless -c "qall" 2>&1) || true
          echo "$output"
          if echo "$output" | grep -qE 'E[0-9]+:'; then exit 1; fi

  git-config-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check gitconfig syntax
        run: git config --file .gitconfig --list > /dev/null

  homebrew-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # main
      - name: Check Homebrew packages exist
        run: ./brewfile.sh

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install actionlint
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Run actionlint
        run: ./actionlint

  setup-test:
    uses: ./.github/workflows/setup.yaml
    with:
      symlinks: true
      claude: true
      codex: true
      opencode: true
      nvim: false
      homebrew: false
      go-tools: false
      brewfile: false
      dotfiles-ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref_name }}
